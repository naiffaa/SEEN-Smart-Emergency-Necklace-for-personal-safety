name: seen
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  flutter_blue_plus: ^1.31.13
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.0.0
  pdf: ^3.10.8
  printing: ^5.12.0
  url_launcher: ^6.2.6
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  firebase_messaging: ^16.1.3
  cloud_firestore: ^6.1.2
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assests/images/logo.JPG

  fonts:
    - family: Inter
      fonts:
        - asset: assests/fonts/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assests/fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assests/fonts/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assests/fonts/Inter_18pt-Bold.ttf
          weight: 700